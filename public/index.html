<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Elsewhere Inventory</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="shortcut icon" href="/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Elsewhere">
<meta name="description" content="Event-wide equipment checkout and inventory tracker.">
<meta name="theme-color" content="#2a5f3f">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Elsewhere Inventory">
<meta property="og:title" content="Elsewhere Inventory">
<meta property="og:description" content="Event-wide equipment checkout and inventory tracker.">
<meta property="og:url" content="https://barrios.thep.it/">
<meta property="og:image" content="https://barrios.thep.it/assets/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Elsewhere Inventory">
<meta name="twitter:description" content="Event-wide equipment checkout and inventory tracker.">
<meta name="twitter:image" content="https://barrios.thep.it/assets/og-image.png">
<link rel="stylesheet" href="/assets/css/main.css?v=1.0.0">
<link rel="stylesheet" href="/assets/css/app.css?v=1.0.1">
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">ELSE<span>WHERE</span></div>
    <div class="header-controls">
      <div class="lang-switcher" id="lang-switcher"></div>
      <div class="user-info">
        <span id="header-user"></span>
        <a id="admin-link" href="/admin/" data-i18n="nav.admin" style="display:none;font-size:12px;color:var(--text2);text-decoration:none;border:0.5px solid var(--border-med);border-radius:6px;padding:4px 10px">Admin</a>
        <button class="logout-btn" id="logout-btn" data-i18n="nav.logout">Log out</button>
      </div>
    </div>
  </div>
  <nav>
    <button class="active" data-tab="checkout"  data-i18n="nav.lend">Lend</button>
    <button data-tab="checkin"   data-i18n="nav.scanIn">Scan In</button>
    <button data-tab="barrios"   data-i18n="nav.barrios" style="display:none">Barrios</button>
    <button data-tab="inventory" data-i18n="nav.inventory">Inventory</button>
    <button data-tab="history"   data-i18n="nav.history">History</button>
    <button data-tab="orders"    data-i18n="nav.orders" style="display:none">Orders</button>
  </nav>
</header>

<main>
  <div class="tab-panel" id="tab-checkout"></div>
  <div class="tab-panel" id="tab-checkin"   style="display:none"></div>
  <div class="tab-panel" id="tab-barrios"   style="display:none"></div>
  <div class="tab-panel" id="tab-inventory" style="display:none"></div>
  <div class="tab-panel" id="tab-history"   style="display:none"></div>
  <div class="tab-panel" id="tab-orders"    style="display:none"></div>
  <div class="tab-panel" id="tab-validate"  style="display:none"></div>
</main>

<div id="toast"></div>

<script src="/assets/vendor/jsqr.min.js?v=1.0.0"></script>
<script type="module" src="/assets/js/app.js?v=1.0.2"></script>
</body>
</html>
