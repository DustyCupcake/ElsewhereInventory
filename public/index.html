<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">

<link rel="manifest" href="/manifest.json">

<meta name="theme-color" content="#2a5f3f">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Elsewhere Inventory">
<meta property="og:title" content="Elsewhere Inventory">

<link rel="stylesheet" href="/assets/css/main.css?v=1.0.1">
<link rel="stylesheet" href="/assets/css/app.css?v=1.0.1">
<link rel="stylesheet" href="/assets/css/scan.css?v=1.0.0">
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">ELSE<span>WHERE</span></div>
    <div class="header-controls">
      <div class="user-info">
        <span id="header-user"></span>
        <button class="hamburger-btn" id="hamburger-btn" aria-label="Menu">&#9776;</button>
      </div>
    </div>
  </div>
  <div id="back-bar">
    <button id="back-home-btn" data-i18n="nav.backHome">← Home</button>
  </div>
  <nav style="display:none">
    <button data-tab="checkout"  data-i18n="nav.lend">Lend</button>
    <button data-tab="checkin"   data-i18n="nav.scanIn">Scan In</button>
    <button data-tab="barrios"   data-i18n="nav.barrios">Barrios</button>
    <button data-tab="inventory" data-i18n="nav.inventory">Inventory</button>
    <button data-tab="history"   data-i18n="nav.history">History</button>
    <button data-tab="orders"    data-i18n="nav.orders">Orders</button>
  </nav>
</header>

<div id="session-banner" style="display:none"></div>

<main>
  <div class="tab-panel" id="tab-home"                  style="display:none"></div>
  <div class="tab-panel" id="tab-scanner"               style="display:none"></div>
  <div class="tab-panel" id="tab-checkout"              style="display:none"></div>
  <div class="tab-panel" id="tab-checkin"               style="display:none"></div>
  <div class="tab-panel" id="tab-barrios"               style="display:none"></div>
  <div class="tab-panel" id="tab-inventory"             style="display:none"></div>
  <div class="tab-panel" id="tab-history"               style="display:none"></div>
  <div class="tab-panel" id="tab-orders"                style="display:none"></div>
  <div class="tab-panel" id="tab-validate"              style="display:none"></div>
</main>

<div id="toast"></div>

<!-- Side menu -->
<div id="menu-backdrop" class="menu-backdrop"></div>
<nav class="side-menu" id="side-menu">
  <div class="side-menu-header">
    <div class="side-menu-user" id="side-menu-user"></div>
  </div>
  <button class="side-menu-item" data-menu="inventory">
    <span class="side-menu-item-icon">📦</span><span data-i18n="nav.inventory">Inventory</span>
  </button>
  <button class="side-menu-item" data-menu="history">
    <span class="side-menu-item-icon">📋</span><span data-i18n="nav.history">History</span>
  </button>
  <button class="side-menu-item" data-menu="barrios" style="display:none">
    <span class="side-menu-item-icon">⛺</span><span data-i18n="nav.barrios">Barrios</span>
  </button>
  <button class="side-menu-item" data-menu="orders" style="display:none">
    <span class="side-menu-item-icon">📝</span><span data-i18n="nav.orders">Orders</span>
  </button>
  <div class="side-menu-divider"></div>
  <a class="side-menu-item" id="menu-admin-link" href="/admin/" style="display:none">
    <span class="side-menu-item-icon">⚙️</span><span data-i18n="nav.adminPanel">Admin panel</span>
  </a>
  <a class="side-menu-item" id="menu-my-qr-link" href="/api/my-qr" target="_blank">
    <span class="side-menu-item-icon">🪪</span><span data-i18n="nav.myQr">My QR code</span>
  </a>
  <div class="side-menu-divider"></div>
  <div class="side-menu-lang" id="lang-switcher-menu"></div>
  <div class="side-menu-divider"></div>
  <button class="side-menu-item" id="menu-logout-btn">
    <span class="side-menu-item-icon">→</span><span data-i18n="nav.logout">Log out</span>
  </button>
</nav>

<script src="/assets/vendor/jsqr.min.js?v=1.0.0"></script>
<script type="module" src="/assets/js/app.js?v=1.0.4"></script>
</body>
</html>
