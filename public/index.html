<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Elsewhere Inventory</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=2">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=2">
<link rel="shortcut icon" href="/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2">
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Elsewhere">
<meta name="description" content="Event-wide equipment checkout and inventory tracker.">
<meta name="theme-color" content="#2a5f3f">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Elsewhere Inventory">
<meta property="og:title" content="Elsewhere Inventory">
<meta property="og:description" content="Event-wide equipment checkout and inventory tracker.">
<meta property="og:url" content="https://barrios.thep.it/">
<meta property="og:image" content="https://barrios.thep.it/assets/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Elsewhere Inventory">
<meta name="twitter:description" content="Event-wide equipment checkout and inventory tracker.">
<meta name="twitter:image" content="https://barrios.thep.it/assets/og-image.png">
<link rel="stylesheet" href="/assets/css/main.css?v=1.0.3">
<link rel="stylesheet" href="/assets/css/app.css?v=1.0.3">
<link rel="stylesheet" href="/assets/css/scan.css?v=1.0.3">
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">ELSE<span>WHERE</span></div>
    <div class="header-controls">
      <div class="user-info">
        <button class="user-name-btn" id="header-user-btn" aria-label="Account"></button>
        <button class="hamburger-btn" id="hamburger-btn" aria-label="Menu">&#9776;</button>
        <a class="header-signin-link" id="header-signin-link" href="/login.html" style="display:none">Sign in</a>
      </div>
    </div>
  </div>
  <div id="back-bar">
    <button id="back-home-btn" data-i18n="nav.backHome">← Home</button>
  </div>
  <nav style="display:none">
    <button data-tab="checkout"  data-i18n="nav.lend">Lend</button>
    <button data-tab="checkin"   data-i18n="nav.scanIn">Scan In</button>
    <button data-tab="barrios"   data-i18n="nav.barrios">Barrios</button>
    <button data-tab="inventory" data-i18n="nav.inventory">Inventory</button>
    <button data-tab="history"   data-i18n="nav.history">History</button>
    <button data-tab="orders"    data-i18n="nav.orders">Orders</button>
  </nav>
</header>

<div id="session-banner" style="display:none"></div>

<main>
  <div class="tab-panel" id="tab-home"                  style="display:none"></div>
  <div class="tab-panel" id="tab-scanner"               style="display:none"></div>
  <div class="tab-panel" id="tab-checkout"              style="display:none"></div>
  <div class="tab-panel" id="tab-checkin"               style="display:none"></div>
  <div class="tab-panel" id="tab-barrios"               style="display:none"></div>
  <div class="tab-panel" id="tab-inventory"             style="display:none"></div>
  <div class="tab-panel" id="tab-history"               style="display:none"></div>
  <div class="tab-panel" id="tab-orders"                style="display:none"></div>
  <div class="tab-panel" id="tab-validate"              style="display:none"></div>
  <div class="tab-panel" id="tab-fill-requests"         style="display:none"></div>
</main>

<div id="toast"></div>

<!-- Account modal -->
<div id="account-modal" class="modal-overlay" style="display:none" role="dialog" aria-modal="true" aria-label="Account">
  <div class="modal-sheet">
    <div class="modal-header">
      <div class="modal-title" id="account-modal-name"></div>
      <button class="modal-close-btn" id="account-modal-close" aria-label="Close">✕</button>
    </div>

    <div class="modal-section">
      <div class="modal-section-label">My QR code</div>
      <div id="account-qr-wrap" class="account-qr-wrap"></div>
    </div>

    <div class="modal-section">
      <div class="modal-section-label">Equipment I have out</div>
      <div id="account-items-list" class="account-items-list">
        <div class="account-items-empty">Loading…</div>
      </div>
    </div>

    <div class="modal-section">
      <div class="modal-section-label">Change password</div>
      <div id="account-pw-form">
        <input type="password" id="acc-pw-current" placeholder="Current password" autocomplete="current-password">
        <input type="password" id="acc-pw-new"     placeholder="New password (min 8)" autocomplete="new-password">
        <input type="password" id="acc-pw-confirm" placeholder="Confirm new password" autocomplete="new-password">
        <div id="acc-pw-msg" class="acc-pw-msg" style="display:none"></div>
        <button class="btn primary sm" id="acc-pw-save" style="margin-top:.5rem">Change password</button>
      </div>
    </div>

    <div class="modal-section">
      <div class="modal-section-label">Scan settings</div>
      <div id="account-scan-settings"></div>
    </div>
  </div>
</div>

<!-- Side menu -->
<div id="menu-backdrop" class="menu-backdrop"></div>
<nav class="side-menu" id="side-menu">
  <div class="side-menu-header">
    <div class="side-menu-user" id="side-menu-user"></div>
  </div>
  <button class="side-menu-item" data-menu="inventory">
    <span class="side-menu-item-icon">📦</span><span data-i18n="nav.inventory">Inventory</span>
  </button>
  <button class="side-menu-item" data-menu="history">
    <span class="side-menu-item-icon">📋</span><span data-i18n="nav.history">History</span>
  </button>
  <button class="side-menu-item" data-menu="barrios" style="display:none">
    <span class="side-menu-item-icon">⛺</span><span data-i18n="nav.barrios">Barrios</span>
  </button>
  <button class="side-menu-item" data-menu="orders" style="display:none">
    <span class="side-menu-item-icon">📝</span><span data-i18n="nav.orders">Orders</span>
  </button>
  <button class="side-menu-item" data-menu="fill-requests" style="display:none">
    <span class="side-menu-item-icon">💧</span>Water fills
  </button>
  <div class="side-menu-divider"></div>
  <a class="side-menu-item" id="menu-admin-link" href="/admin/" style="display:none">
    <span class="side-menu-item-icon">⚙️</span><span data-i18n="nav.adminPanel">Admin panel</span>
  </a>
  <a class="side-menu-item" id="menu-my-qr-link" href="/api/my-qr" target="_blank">
    <span class="side-menu-item-icon">🪪</span><span data-i18n="nav.myQr">My QR code</span>
  </a>
  <div class="side-menu-divider"></div>
  <div class="side-menu-lang" id="lang-switcher-menu"></div>
  <div class="side-menu-divider"></div>
  <button class="side-menu-item" id="menu-logout-btn">
    <span class="side-menu-item-icon">→</span><span data-i18n="nav.logout">Log out</span>
  </button>
</nav>

<!-- Identity prompt modal (shown when guest tries an action requiring auth) -->
<div id="identity-modal-backdrop" class="modal-overlay" style="display:none"></div>
<div id="identity-modal" class="identity-modal" style="display:none" role="dialog" aria-modal="true" aria-label="Identify yourself">
  <button class="identity-modal-close" id="identity-modal-close" aria-label="Close">✕</button>
  <div class="identity-modal-title">Identify yourself to continue</div>
  <div class="identity-modal-message" id="identity-modal-message"></div>
  <button class="btn primary" id="identity-badge-btn">
    <span style="margin-right:.4em">📷</span> Scan my badge
  </button>
  <div class="identity-modal-or">or</div>
  <button class="btn secondary" id="identity-signin-btn">Sign in with account</button>
</div>

<script src="/assets/vendor/jsqr.min.js?v=1.0.0"></script>
<script type="module" src="/assets/js/app.js?v=1.0.6"></script>
</body>
</html>
