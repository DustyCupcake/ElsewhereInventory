<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Elsewhere Inventory — Voucher check</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=2">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=2">
<link rel="shortcut icon" href="/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#2a5f3f">
<link rel="stylesheet" href="/assets/css/main.css?v=1.0.2">
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 1.25rem 1rem 2rem;
  }
  .vc-header {
    position: relative;
    width: 100%;
    max-width: 420px;
    text-align: center;
    margin-bottom: 1.25rem;
    padding-bottom: 1.5rem;
  }
  .vc-logo { font-size: 13px; color: var(--text3); margin-bottom: .35rem; }
  .vc-logo span { color: var(--accent); }
  .vc-title { font-size: 20px; color: var(--text); }
  .vc-wrap { width: 100%; max-width: 420px; }

  /* Scanner card */
  .vc-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.1rem 1.25rem;
    margin-bottom: 1rem;
  }
  .vc-card-label {
    font-size: 10px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: .75rem;
  }
  .vc-video-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 1;
    border-radius: var(--radius);
    overflow: hidden;
    background: #000;
    margin-bottom: .75rem;
  }
  .vc-video-wrap video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .vc-scan-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .vc-scan-frame {
    width: 58%; aspect-ratio: 1;
    border: 2px solid rgba(255,255,255,.7);
    border-radius: 12px;
    position: relative;
    overflow: hidden;
  }
  .vc-scan-line {
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: rgba(255,255,255,.8);
    animation: vc-scan 2s linear infinite;
  }
  @keyframes vc-scan { 0% { top: 0 } 50% { top: calc(100% - 2px) } 100% { top: 0 } }

  .vc-status { font-size: 13px; color: var(--text2); text-align: center; margin-bottom: .5rem; }

  .vc-manual-link {
    display: block;
    margin: .5rem auto 0;
    background: none;
    border: none;
    font-family: 'Georgia', serif;
    font-size: 13px;
    color: var(--text3);
    cursor: pointer;
    text-decoration: underline;
    padding: 4px 8px;
  }
  .vc-manual-link:hover { color: var(--text2); }

  .vc-manual-wrap {
    display: flex;
    gap: .5rem;
    margin-top: .75rem;
    align-items: flex-end;
  }
  .vc-manual-wrap input {
    flex: 1;
    padding: 9px 12px;
    font-family: 'Georgia', serif;
    font-size: 14px;
    border: 0.5px solid var(--border-med);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text);
  }
  .vc-manual-wrap input:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  .vc-manual-wrap .btn { margin-top: 0; width: auto; padding: 9px 16px; }

  /* Status result card */
  .vc-result {
    border-radius: var(--radius-lg);
    padding: 1.25rem;
    margin-bottom: 1rem;
    text-align: center;
  }
  .vc-result.confirmed  { background: var(--accent-light); border: 0.5px solid var(--accent); }
  .vc-result.validated  { background: var(--warn-bg);      border: 0.5px solid var(--warn-border); }
  .vc-result.activated  { background: #e8f0fe;             border: 0.5px solid #4a80d4; }
  .vc-result.pending    { background: var(--surface);      border: 0.5px solid var(--border-med); }
  .vc-result.unknown,
  .vc-result.not_found  { background: var(--surface);      border: 0.5px solid var(--border-med); }

  .vc-result-icon  { font-size: 2rem; margin-bottom: .5rem; }
  .vc-result-title { font-size: 16px; font-weight: bold; margin-bottom: .4rem; }
  .vc-result-body  { font-size: 13px; color: var(--text2); line-height: 1.5; }

  .vc-result.confirmed  .vc-result-title { color: var(--accent-text); }
  .vc-result.validated  .vc-result-title { color: var(--warn); }
  .vc-result.activated  .vc-result-title { color: #2a56a0; }
  .vc-result.pending    .vc-result-title { color: var(--text2); }
  .vc-result.unknown    .vc-result-title,
  .vc-result.not_found  .vc-result-title { color: var(--text2); }

  .vc-back-link {
    position: absolute;
    bottom: .6rem;
    left: 0;
    font-size: 12px;
    color: var(--text3);
    text-decoration: none;
  }
  .vc-back-link:hover { color: var(--accent); }
</style>
</head>
<body>
<div class="vc-header">
  <a href="/" class="page-back" style="position:absolute;left:0;top:.4rem">← App</a>
  <div class="vc-logo">ELSE<span>WHERE</span></div>
  <div class="vc-title">Water voucher check</div>
  <a href="/water" class="vc-back-link">← Water info</a>
</div>

<div class="vc-wrap" id="vc-wrap">
  <!-- Filled by voucher.js -->
</div>

<script type="module" src="/assets/js/voucher.js?v=1.0.0"></script>
</body>
</html>
