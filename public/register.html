<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Create Account</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=2">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#2a5f3f">
<link rel="stylesheet" href="/assets/css/main.css?v=1.0.2">
<style>
  body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1rem; }
  .box { width:100%; max-width:360px; }
  .logo { text-align:center; font-size:22px; margin-bottom:1.75rem; }
  .logo span { color:var(--accent); }
  .box .card { padding:1.5rem; }
  .error-msg  { font-size:13px; color:var(--danger); margin-bottom:.5rem; display:none; }
  .info-badge { background:var(--surface2); border-radius:var(--radius); padding:.6rem 1rem;
                font-size:13px; color:var(--text2); margin-bottom:1rem; }
  .info-badge strong { color:var(--text); }
  .btn { margin-top:.75rem; }
  .login-link { text-align:center; margin-top:1rem; font-size:13px; color:var(--text2); }
  .login-link a { color:var(--accent); text-decoration:none; }
  .success-icon { text-align:center; font-size:2.5rem; margin-bottom:.75rem; }
  .success-msg  { text-align:center; font-size:14px; color:var(--text2); line-height:1.5; }
  [data-view] { display:none; }
  [data-view].active { display:block; }
  .spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,.3);
             border-top-color:#fff; border-radius:50%; animation:spin .6s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="box">
  <div class="logo">ELSE<span>WHERE</span></div>
  <div class="card">

    <!-- Invalid token view -->
    <div data-view="invalid" class="active">
      <div class="success-icon" style="color:var(--danger)">✕</div>
      <div class="success-msg" id="invalid-msg">This invite link is invalid or has expired.</div>
      <div class="login-link" style="margin-top:1.25rem"><a href="/login.html">Go to login</a></div>
    </div>

    <!-- Register view -->
    <div data-view="register">
      <div id="role-badge" class="info-badge"></div>
      <div id="reg-error" class="error-msg"></div>
      <div class="field">
        <label for="reg-name">Display name</label>
        <input type="text" id="reg-name" autocomplete="name" placeholder="Your name">
      </div>
      <div class="field">
        <label for="reg-username">Username</label>
        <input type="text" id="reg-username" autocomplete="username" placeholder="choose a username">
      </div>
      <div class="field">
        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" autocomplete="new-password" placeholder="min 8 characters">
      </div>
      <div class="field">
        <label for="reg-confirm">Confirm password</label>
        <input type="password" id="reg-confirm" autocomplete="new-password" placeholder="••••••••">
      </div>
      <button class="btn primary" id="reg-btn" onclick="doRegister()">Create account</button>
      <div class="login-link">Already have an account? <a href="/login.html">Log in</a></div>
    </div>

    <!-- Success view -->
    <div data-view="success">
      <div class="success-icon" style="color:var(--accent)">✓</div>
      <div class="success-msg">Account created! You can now log in.</div>
      <div class="login-link" style="margin-top:1.25rem"><a href="/login.html">Go to login</a></div>
    </div>

  </div>
</div>

<script>
const token = new URLSearchParams(location.search).get('token') || '';

const ROLE_LABELS = {
  production_admin: 'Production Admin',
  production_staff: 'Production Staff',
  dept_admin: 'Team Admin',
  dept_staff:  'Team Staff / Volunteer',
};

function showView(name) {
  document.querySelectorAll('[data-view]').forEach(el => el.classList.remove('active'));
  document.querySelector(`[data-view="${name}"]`).classList.add('active');
}

(async () => {
  if (!token) {
    document.getElementById('invalid-msg').textContent = 'No invite link provided. Ask an admin for an invite link.';
    showView('invalid');
    return;
  }

  try {
    const resp = await fetch('/api/auth/invite-info?token=' + encodeURIComponent(token), { credentials: 'include' });
    const data = await resp.json();

    if (!data.valid) {
      const msgs = {
        not_found: 'This invite link does not exist.',
        used:      'This invite link has already been used.',
        expired:   'This invite link has expired.',
      };
      document.getElementById('invalid-msg').textContent = msgs[data.reason] || 'Invalid invite link.';
      showView('invalid');
      return;
    }

    const roleLabel = ROLE_LABELS[data.role] || data.role;
    const deptPart  = data.dept_name ? ` — ${data.dept_name}` : '';
    document.getElementById('role-badge').innerHTML =
      `Joining as: <strong>${roleLabel}${deptPart}</strong>`;
    showView('register');
  } catch {
    document.getElementById('invalid-msg').textContent = 'Network error. Please try again.';
    showView('invalid');
  }
})();

async function doRegister() {
  const display_name     = document.getElementById('reg-name').value.trim();
  const username         = document.getElementById('reg-username').value.trim();
  const password         = document.getElementById('reg-password').value;
  const confirm_password = document.getElementById('reg-confirm').value;
  const errEl            = document.getElementById('reg-error');
  const btn              = document.getElementById('reg-btn');

  errEl.style.display = 'none';

  if (!display_name || !username || !password || !confirm_password) {
    errEl.textContent = 'All fields are required.'; errEl.style.display = 'block'; return;
  }
  if (password.length < 8) {
    errEl.textContent = 'Password must be at least 8 characters.'; errEl.style.display = 'block'; return;
  }
  if (password !== confirm_password) {
    errEl.textContent = 'Passwords do not match.'; errEl.style.display = 'block'; return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Creating account…';

  try {
    const resp = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ invite_token: token, username, display_name, password, confirm_password }),
    });
    const data = await resp.json();

    if (!resp.ok) {
      errEl.textContent = data.error || 'Registration failed';
      errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Create account';
      return;
    }

    showView('success');
  } catch {
    errEl.textContent = 'Network error — check connection';
    errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Create account';
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.querySelector('[data-view="register"].active')) doRegister();
});
</script>
</body>
</html>
