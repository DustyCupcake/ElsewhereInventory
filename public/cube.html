<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Elsewhere Inventory — Water cube</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=2">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=2">
<link rel="shortcut icon" href="/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#2a5f3f">
<link rel="stylesheet" href="/assets/css/main.css?v=1.0.2">
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 1.25rem 1rem 2rem;
  }
  .cb-header {
    position: relative;
    width: 100%;
    max-width: 420px;
    text-align: center;
    margin-bottom: 1.25rem;
    padding-bottom: 1.5rem;
  }
  .cb-logo  { font-size: 13px; color: var(--text3); margin-bottom: .35rem; }
  .cb-logo span { color: var(--accent); }
  .cb-title { font-size: 20px; color: var(--text); }
  .cb-wrap  { width: 100%; max-width: 420px; }

  .cb-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.1rem 1.25rem;
    margin-bottom: 1rem;
  }
  .cb-card-label {
    font-size: 10px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: .75rem;
  }
  .cb-video-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 1;
    border-radius: var(--radius);
    overflow: hidden;
    background: #000;
    margin-bottom: .75rem;
  }
  .cb-video-wrap video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .cb-scan-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .cb-scan-frame {
    width: 58%; aspect-ratio: 1;
    border: 2px solid rgba(255,255,255,.7);
    border-radius: 12px;
    position: relative;
    overflow: hidden;
  }
  .cb-scan-line {
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: rgba(255,255,255,.8);
    animation: cb-scan 2s linear infinite;
  }
  @keyframes cb-scan { 0% { top: 0 } 50% { top: calc(100% - 2px) } 100% { top: 0 } }

  .cb-status { font-size: 13px; color: var(--text2); text-align: center; margin-bottom: .5rem; }

  .cb-manual-link {
    display: block; margin: .5rem auto 0;
    background: none; border: none;
    font-family: 'Georgia', serif; font-size: 13px;
    color: var(--text3); cursor: pointer; text-decoration: underline;
    padding: 4px 8px;
  }
  .cb-manual-link:hover { color: var(--text2); }
  .cb-manual-wrap {
    display: flex; gap: .5rem; margin-top: .75rem; align-items: flex-end;
  }
  .cb-manual-wrap input {
    flex: 1; padding: 9px 12px;
    font-family: 'Georgia', serif; font-size: 14px;
    border: 0.5px solid var(--border-med);
    border-radius: var(--radius);
    background: var(--surface); color: var(--text);
  }
  .cb-manual-wrap input:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  .cb-manual-wrap .btn { margin-top: 0; width: auto; padding: 9px 16px; }

  /* Status result */
  .cb-result {
    border-radius: var(--radius-lg);
    padding: 1.25rem;
    margin-bottom: 1rem;
    text-align: center;
  }
  .cb-result.filled    { background: var(--accent-light); border: 0.5px solid var(--accent); }
  .cb-result.requested { background: #e8f0fe;             border: 0.5px solid #4a80d4; }
  .cb-result.ready     { background: var(--surface);      border: 0.5px solid var(--border-med); }
  .cb-result.no_credits { background: var(--warn-bg);     border: 0.5px solid var(--warn-border); }
  .cb-result.not_found  { background: var(--surface);     border: 0.5px solid var(--border-med); }

  .cb-result-icon  { font-size: 2rem; margin-bottom: .5rem; }
  .cb-result-title { font-size: 16px; font-weight: bold; margin-bottom: .4rem; }
  .cb-result-body  { font-size: 13px; color: var(--text2); line-height: 1.5; }

  .cb-result.filled    .cb-result-title { color: var(--accent-text); }
  .cb-result.requested .cb-result-title { color: #2a56a0; }
  .cb-result.no_credits .cb-result-title { color: var(--warn); }

  .cb-meta {
    font-size: 11px; color: var(--text3); margin-top: .6rem;
    display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;
  }
  .cb-meta span { white-space: nowrap; }

  .cb-request-btn {
    margin-top: .75rem; width: 100%;
  }

  .cb-credits-info {
    font-size: 12px; color: var(--text3);
    margin-top: .4rem; text-align: center;
  }
</style>
</head>
<body>
<div class="cb-header">
  <div class="cb-logo">ELSE<span>WHERE</span></div>
  <div class="cb-title">Water cube</div>
</div>

<div class="cb-wrap" id="cb-wrap">
  <!-- Filled by cube.js -->
</div>

<script type="module" src="/assets/js/cube.js?v=1.0.0"></script>
</body>
</html>
