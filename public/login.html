<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Elsewhere Inventory — Login</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="shortcut icon" href="/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="description" content="Event-wide equipment checkout and inventory tracker.">
<meta name="theme-color" content="#2a5f3f">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Elsewhere Inventory">
<meta property="og:title" content="Elsewhere Inventory">
<meta property="og:description" content="Event-wide equipment checkout and inventory tracker.">
<meta property="og:url" content="https://barrios.thep.it/login">
<meta property="og:image" content="https://barrios.thep.it/assets/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Elsewhere Inventory">
<meta name="twitter:description" content="Event-wide equipment checkout and inventory tracker.">
<meta name="twitter:image" content="https://barrios.thep.it/assets/og-image.png">
<link rel="stylesheet" href="/assets/css/main.css?v=1.0.0">
<style>
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
  .login-box { width: 100%; max-width: 360px; }
  .logo { text-align: center; font-size: 22px; margin-bottom: 1.75rem; }
  .logo span { color: var(--accent); }
  .login-box .card { padding: 1.5rem; }
  .error-msg { font-size: 13px; color: var(--danger); margin-bottom: .5rem; display: none; }
  .btn { margin-top: .75rem; }
  .switch-link { text-align: center; margin-top: 1rem; font-size: 13px; color: var(--text2); }
  .switch-link a { color: var(--accent); text-decoration: none; cursor: pointer; }
  .switch-link a:hover { text-decoration: underline; }
  .success-icon { text-align: center; font-size: 2rem; margin-bottom: .75rem; }
  .success-msg { text-align: center; font-size: 14px; color: var(--text2); line-height: 1.5; }
  [data-view] { display: none; }
  [data-view].active { display: block; }
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">ELSE<span>WHERE</span></div>
  <div class="card">

    <!-- Login view -->
    <div data-view="login" class="active">
      <div id="login-error" class="error-msg"></div>
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" autocomplete="username" placeholder="your username">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password" placeholder="••••••••">
      </div>
      <button class="btn primary" id="login-btn" onclick="doLogin()">Log in</button>
      <div class="switch-link">Don't have an account? <a onclick="showView('register')">Create account</a></div>
    </div>

    <!-- Register view -->
    <div data-view="register">
      <div id="reg-error" class="error-msg"></div>
      <div class="field">
        <label for="reg-name">Display name</label>
        <input type="text" id="reg-name" autocomplete="name" placeholder="Your name">
      </div>
      <div class="field">
        <label for="reg-username">Username</label>
        <input type="text" id="reg-username" autocomplete="username" placeholder="choose a username">
      </div>
      <div class="field">
        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" autocomplete="new-password" placeholder="min 8 characters">
      </div>
      <div class="field">
        <label for="reg-confirm">Confirm password</label>
        <input type="password" id="reg-confirm" autocomplete="new-password" placeholder="••••••••">
      </div>
      <button class="btn primary" id="reg-btn" onclick="doRegister()">Create account</button>
      <div class="switch-link">Already have an account? <a onclick="showView('login')">Log in</a></div>
    </div>

    <!-- Success view -->
    <div data-view="success">
      <div class="success-icon">✓</div>
      <div class="success-msg">Account created! An admin will activate your account before you can log in.</div>
      <div class="switch-link" style="margin-top:1.25rem"><a onclick="showView('login')">Back to login</a></div>
    </div>

  </div>
</div>
<div id="toast"></div>

<script>
function showView(name) {
  document.querySelectorAll('[data-view]').forEach(el => el.classList.remove('active'));
  document.querySelector(`[data-view="${name}"]`).classList.add('active');
}

async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const errEl    = document.getElementById('login-error');
  const btn      = document.getElementById('login-btn');

  errEl.style.display = 'none';
  if (!username || !password) {
    errEl.textContent = 'Please enter your username and password.';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Logging in…';

  try {
    const resp = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ username, password }),
    });
    const data = await resp.json();

    if (!resp.ok) {
      errEl.textContent = data.error || 'Login failed';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Log in';
      return;
    }

    // Redirect: honour ?next= for deep-links, fall back to role default
    const params = new URLSearchParams(location.search);
    const next   = params.get('next') || '';
    const safe   = next.startsWith('/') && !next.startsWith('//');
    if (data.role === 'admin' && (!safe || next === '/admin/')) {
      window.location.href = '/admin/';
    } else {
      window.location.href = safe ? next : '/';
    }
  } catch {
    errEl.textContent = 'Network error — check connection';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Log in';
  }
}

async function doRegister() {
  const display_name     = document.getElementById('reg-name').value.trim();
  const username         = document.getElementById('reg-username').value.trim();
  const password         = document.getElementById('reg-password').value;
  const confirm_password = document.getElementById('reg-confirm').value;
  const errEl            = document.getElementById('reg-error');
  const btn              = document.getElementById('reg-btn');

  errEl.style.display = 'none';

  if (!display_name || !username || !password || !confirm_password) {
    errEl.textContent = 'All fields are required.';
    errEl.style.display = 'block';
    return;
  }
  if (password.length < 8) {
    errEl.textContent = 'Password must be at least 8 characters.';
    errEl.style.display = 'block';
    return;
  }
  if (password !== confirm_password) {
    errEl.textContent = 'Passwords do not match.';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Creating account…';

  try {
    const resp = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ username, display_name, password, confirm_password }),
    });
    const data = await resp.json();

    if (!resp.ok) {
      errEl.textContent = data.error || 'Registration failed';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Create account';
      return;
    }

    showView('success');
  } catch {
    errEl.textContent = 'Network error — check connection';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Create account';
  }
}

// Submit on Enter
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const active = document.querySelector('[data-view].active');
  if (active?.dataset.view === 'login')    doLogin();
  if (active?.dataset.view === 'register') doRegister();
});
</script>
</body>
</html>
